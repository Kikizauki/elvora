<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELVOR4 - Profil & Edit</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --accent: #ffbd59;
            --primary: #800020;
            --card-bg: rgba(30, 41, 59, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; color: white; min-height: 100vh; overflow-x: hidden; }

        header {
            padding: 12px 5% 5px 5%; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(128, 0, 32, 0.3);
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-anim { font-size: 1.2rem; font-weight: 900; color: var(--accent); letter-spacing: 1px; cursor: pointer; }
        
        .nav-tabs { display: flex; gap: 20px; justify-content: center; }
        .nav-link { 
            color: #888; font-size: 11px; font-weight: 700; text-decoration: none; 
            padding: 5px 10px; transition: 0.3s; border-bottom: 2px solid transparent;
            text-transform: uppercase;
        }
        .nav-link.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .btn-add { display: none; background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; }

        .profile-section { margin: 20px 5% 35px 5%; padding: 15px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255, 189, 89, 0.3); border-radius: 15px; }
        .section-header { margin-bottom: 20px; border-bottom: 1px solid rgba(255,189,89,0.1); padding-bottom: 10px; }
        .section-title { font-size: 0.85rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        .structure-container { display: flex; flex-direction: column; align-items: center; gap: 25px; margin-bottom: 40px; }
        .core-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 180px)); gap: 15px; width: 100%; justify-content: center; }

        .profile-card {
            background: var(--card-bg); border-radius: 12px; padding: 12px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            position: relative; transition: 0.3s; height: 100%;
        }
        .profile-card.core { border: 1px solid var(--accent); }

        .photo-frame { width: 100%; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; margin-bottom: 10px; border: 1px solid rgba(255,189,89,0.2); }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .p-role { font-size: 8px; background: var(--primary); color: white; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 5px; font-weight: 900; text-transform: uppercase; }
        .p-name { font-size: 11px; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 4px; }
        .p-hobi { font-size: 9px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
        .p-msg { font-size: 9px; color: #888; font-style: italic; line-height: 1.2; }

        .admin-controls { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 5px; z-index: 10; }
        .btn-mini { background: rgba(0,0,0,0.7); color: white; border: 1px solid rgba(255,255,255,0.3); width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; }

        .profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9998; backdrop-filter: blur(4px); }
        .input-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #161e2e; padding: 20px; border-radius: 15px; width: 85%; max-width: 320px; z-index: 10000; border: 1px solid var(--primary);
        }
        input, textarea, select { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-size: 12px; outline: none; }
        .btn-action { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-del-danger { width: 100%; padding: 8px; background: transparent; color: #ff4444; border: 1px solid #ff4444; border-radius: 6px; font-size: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; }

        #custom-toast { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: var(--primary); color: white; padding: 10px 20px; border-radius: 50px; 
            font-size: 12px; font-weight: bold; z-index: 20000; display: none; border: 1px solid var(--accent);
        }

        .confirm-box {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1a; padding: 20px; border-radius: 12px; width: 280px; z-index: 10005; border: 1px solid #333; text-align: center;
        }

        .zoom-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10001; justify-content: center; align-items: center; }
        .zoom-card { width: 85%; max-width: 300px; text-align: center; }
        .zoom-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); margin-bottom: 15px; }

        @media (max-width: 480px) {
            .profile-grid { grid-template-columns: repeat(2, 1fr); }
            .core-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div id="custom-toast"></div>
    <div class="modal-overlay" id="overlay" onclick="closeAll()"></div>

    <div class="confirm-box" id="confirm-box">
        <p style="margin-bottom: 20px; font-size: 14px;">Hapus profil ini secara permanen?</p>
        <div style="display: flex; gap: 10px;">
            <button onclick="executeDelete()" style="flex:1; padding: 10px; background: #ff4444; border:none; color:white; border-radius:5px; font-weight:bold; cursor:pointer;">HAPUS</button>
            <button onclick="hideConfirm()" style="flex:1; padding: 10px; background: #333; border:none; color:white; border-radius:5px; cursor:pointer;">BATAL</button>
        </div>
    </div>

    <div class="zoom-overlay" id="zoom-overlay" onclick="this.style.display='none'">
        <div class="zoom-card">
            <img src="" id="zoom-img" class="zoom-img">
            <div id="zoom-role-tag" class="p-role"></div>
            <h2 id="zoom-name" style="color: var(--accent); font-size: 1.2rem; margin-bottom: 8px;"></h2>
            <p id="zoom-hobi" style="font-size: 12px; color: #ccc; margin-bottom: 12px;"></p>
            <p id="zoom-dream" style="font-size: 13px; color: #fff; font-style: italic; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;"></p>
        </div>
    </div>

    <header>
        <div class="header-top">
            <div class="logo-anim" onclick="location.href='index.html'">ELVOR4</div>
            <button class="btn-add" id="admin-add-btn" onclick="openAddModal()">+ TAMBAH</button>
        </div>
        <nav class="nav-tabs">
            <a href="index.html" class="nav-link">Home</a>
            <a href="profil.html" class="nav-link active">Profil</a>
            <a href="galeri.html" class="nav-link">Galeri</a>
        </nav>
    </header>

    <div class="profile-section">
        <div class="section-header"><h2 class="section-title">🏛️ Struktur Kelas</h2></div>
        <div class="structure-container">
            <div id="walikelas-container" style="width: 180px;"></div>
            <div class="core-grid" id="pengurus-container"></div>
        </div>
        <div class="section-header"><h2 class="section-title">🎓 Anggota Siswa</h2></div>
        <div class="profile-grid" id="siswa-container"></div>
    </div>

    <div class="input-modal" id="input-modal">
        <h4 id="modal-title" style="color:var(--accent); margin-bottom:15px">DATA BARU</h4>
        <input type="hidden" id="edit-id">
        <select id="p-role">
            <option value="Siswa">Siswa</option>
            <option value="Wali Kelas">Wali Kelas</option>
            <option value="Ketua Kelas">Ketua Kelas</option>
            <option value="Sekertaris">Sekertaris</option>
            <option value="Bendahara">Bendahara</option>
        </select>
        <input type="text" id="p-name" placeholder="Nama Lengkap">
        <input type="text" id="p-hobi" placeholder="Hobi">
        <textarea id="p-dream" placeholder="Pesan / Kutipan" rows="2"></textarea>
        <p style="font-size: 9px; color: #666; margin-bottom: 5px;">Foto (Kosongkan jika tidak ingin ganti):</p>
        <input type="file" id="p-photo" accept="image/*">
        <button onclick="submitData()" id="btn-submit" class="btn-action">SIMPAN DATA</button>
        <button onclick="showConfirm()" id="btn-delete-ui" class="btn-del-danger" style="display:none">HAPUS PROFIL</button>
        <p onclick="closeAll()" style="text-align:center; color:#666; font-size: 11px; margin-top: 15px; cursor:pointer;">BATAL</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAQqcXjVEa0K2oNJXcqTl9lCh8lT1ufBwY",
            authDomain: "elvor4.firebaseapp.com",
            databaseURL: "https://elvor4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "elvor4",
            storageBucket: "elvor4.firebasestorage.app",
            messagingSenderId: "722842875129",
            appId: "1:722842875129:web:3735e1f5f2ed03bfd59e28"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const isAdmin = localStorage.getItem('isAdmin') === 'true';
        if(isAdmin) document.getElementById('admin-add-btn').style.display = 'block';

        let deleteTargetId = null;

        function showToast(msg) {
            const t = document.getElementById('custom-toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        function showConfirm() {
            deleteTargetId = document.getElementById('edit-id').value;
            document.getElementById('confirm-box').style.display = 'block';
            document.getElementById('overlay').style.zIndex = '10004';
        }

        function hideConfirm() {
            document.getElementById('confirm-box').style.display = 'none';
            document.getElementById('overlay').style.zIndex = '9998';
        }

        function closeAll() { 
            document.getElementById('input-modal').style.display = 'none'; 
            document.getElementById('overlay').style.display = 'none';
            hideConfirm();
        }

        function openAddModal() {
            document.getElementById('modal-title').innerText = "TAMBAH DATA";
            document.getElementById('edit-id').value = "";
            document.getElementById('p-name').value = "";
            document.getElementById('p-hobi').value = "";
            document.getElementById('p-dream').value = "";
            document.getElementById('btn-delete-ui').style.display = 'none';
            document.getElementById('input-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function openEditModal(id, name, hobi, dream, role) {
            document.getElementById('modal-title').innerText = "EDIT PROFIL";
            document.getElementById('edit-id').value = id;
            document.getElementById('p-name').value = name;
            document.getElementById('p-hobi').value = hobi;
            document.getElementById('p-dream').value = dream;
            document.getElementById('p-role').value = role;
            document.getElementById('btn-delete-ui').style.display = 'block';
            document.getElementById('input-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function viewProfile(name, photo, hobi, dream, role) {
            document.getElementById('zoom-img').src = photo;
            document.getElementById('zoom-name').innerText = name;
            document.getElementById('zoom-role-tag').innerText = role;
            document.getElementById('zoom-hobi').innerText = "Hobby: " + hobi;
            document.getElementById('zoom-dream').innerText = dream ? '"' + dream + '"' : "-";
            document.getElementById('zoom-overlay').style.display = 'flex';
        }

        async function submitData() {
            const id = document.getElementById('edit-id').value;
            const role = document.getElementById('p-role').value;
            const name = document.getElementById('p-name').value;
            const hobi = document.getElementById('p-hobi').value;
            const dream = document.getElementById('p-dream').value;
            const file = document.getElementById('p-photo').files[0];

            if(!name) { showToast("Nama tidak boleh kosong!"); return; }
            
            const btn = document.getElementById('btn-submit');
            btn.innerText = "MENYIMPAN..."; btn.disabled = true;

            const updateDB = (photoUrl) => {
                const data = { name, hobi, dream, role };
                if(photoUrl) data.photo = photoUrl;
                
                if(id) {
                    db.ref('students/' + id).update(data).then(() => location.reload());
                } else {
                    if(!photoUrl) { 
                        showToast("Foto wajib untuk profil baru!"); 
                        btn.innerText = "SIMPAN DATA"; btn.disabled = false;
                        return; 
                    }
                    const newKey = db.ref('students').push().key;
                    data.id = newKey;
                    db.ref('students/' + newKey).set(data).then(() => location.reload());
                }
            };

            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => updateDB(e.target.result);
                reader.readAsDataURL(file);
            } else {
                updateDB(null);
            }
        }

        function executeDelete() {
            if(!deleteTargetId) return;
            db.ref('students/' + deleteTargetId).remove().then(() => {
                showToast("Profil berhasil dihapus");
                setTimeout(() => location.reload(), 1000);
            });
        }

        function createCard(d) {
            const isCore = d.role !== 'Siswa';
            const adminControls = isAdmin ? `
                <div class="admin-controls">
                    <button class="btn-mini" onclick="event.stopPropagation(); openEditModal('${d.id}', '${d.name}', '${d.hobi}', '${d.dream}', '${d.role}')">✎</button>
                </div>` : '';
            
            return `
                <div class="profile-card ${isCore ? 'core' : ''}" onclick="viewProfile('${d.name}', '${d.photo}', '${d.hobi}', '${d.dream}', '${d.role}')">
                    ${adminControls}
                    <div class="p-role" style="${d.role === 'Wali Kelas' ? 'background:gold; color:black;' : ''}">${d.role}</div>
                    <div class="photo-frame"><img src="${d.photo}"></div>
                    <h3 class="p-name">${d.name}</h3>
                    <p class="p-hobi">${d.hobi || '-'}</p>
                    <p class="p-msg">${d.dream ? '"' + d.dream + '"' : ''}</p>
                </div>
            `;
        }

        function loadProfiles() {
            db.ref('students').on('value', (snap) => {
                const containers = {
                    wali: document.getElementById('walikelas-container'),
                    pengurus: document.getElementById('pengurus-container'),
                    siswa: document.getElementById('siswa-container')
                };
                Object.values(containers).forEach(c => c.innerHTML = "");

                snap.forEach(child => {
                    const d = child.val();
                    if (d.role === 'Wali Kelas') containers.wali.innerHTML += createCard(d);
                    else if (d.role === 'Siswa') containers.siswa.innerHTML += createCard(d);
                    else containers.pengurus.innerHTML += createCard(d);
                });
            });
        }

        window.onload = loadProfiles;
    </script>
</body>
</html>
