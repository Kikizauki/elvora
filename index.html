<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>elvor4 - Memories</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: sans-serif;
            background: #1a1a1a;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        .rumus-floating {
            position: fixed;
            font-family: monospace;
            font-size: 1.2rem;
            color: white;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            animation: floatRandom 15s linear infinite;
        }

        @keyframes floatRandom {
            0% { transform: translateX(-200px); }
            100% { transform: translateX(calc(100vw + 200px)); }
        }

        .r1 { top: 15%; animation-duration: 18s; }
        .r2 { top: 35%; animation-duration: 25s; }
        .r3 { top: 60%; animation-duration: 20s; }
        .r4 { bottom: 15%; animation-duration: 22s; }

        .header {
            position: relative;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 5%;
            background: linear-gradient(135deg, #1a1a1a, #444, #1a1a1a);
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid #ff0050;
        }

        .header-content h1 {
            font-size: clamp(24px, 6vw, 50px);
            margin: 0;
            background: linear-gradient(to right, #ff0050, #ffbd59, #ff0050);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            to { background-position: 200% center; }
        }

        /* --- PERBAIKAN BORDER VIDEO --- */
        #header-video {
            width: clamp(90px, 18vw, 130px);
            height: clamp(90px, 18vw, 130px);
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid transparent;
            background: linear-gradient(#1a1a1a, #1a1a1a) padding-box, 
                        linear-gradient(to right, #ff0050, #ffbd59, #ff0050) border-box;
            background-size: 200% auto;
            animation: gradientMove 3s linear infinite;
        }

        .social-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-social {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            width: fit-content;
        }

        .btn-social img { width: 18px; margin-right: 8px; }
        .ig:hover { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%); transform: scale(1.05); }
        .tt:hover { background-color: #000; box-shadow: -2px -2px 0px #41adff, 2px 2px 0px #ff0050; transform: scale(1.05); }

        .navbar { margin-top: 15px; display: flex; gap: 15px; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; }
        .navbar a:hover { border-bottom: 2px solid #ff0050; }

        .page { display: none; padding: 40px 5%; position: relative; z-index: 5; }
        .page.active { display: block; }

        /* --- STYLING AREA UPLOAD --- */
        #dropArea {
            border: 2px dashed #ff0050;
            padding: 40px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        #dropArea.drag { background: rgba(255, 0, 80, 0.1); border-color: #ffbd59; }
        #preview img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; margin-top: 10px; }

        .content { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 30px; justify-content: flex-start; }
        .card {
            width: clamp(150px, 25vw, 250px);
            background: linear-gradient(#222, #222) padding-box, linear-gradient(to right, #ff0050, #ffbd59, #ff0050) border-box;
            border: 3px solid transparent;
            color: white; padding: 10px; border-radius: 12px; position: relative; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); transition: 0.4s ease; min-height: 180px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(255, 0, 80, 0.3); }

        /* Zoom Card styles tetap sama */
        .card.active {
            position: fixed !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important;
            width: 90vw; max-width: 600px; max-height: 85vh; overflow-y: auto; z-index: 999999 !important;
            background: #1a1a1a; padding: 20px; border-radius: 20px; display: block;
        }
        .card.active p { display: block; }
        .card p { display: none; margin-top: 15px; font-size: 14px; }
        .card img, .card video { width: 100%; border-radius: 8px; opacity: 0; transition: 0.5s; }
        .card.loaded img, .card.loaded video { opacity: 1; }

        .close-zoom { display: none; position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; background: #ff0050; color: white; border-radius: 50%; text-align: center; line-height: 30px; cursor: pointer; }
        .overlay-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999998; }
        .card.active .close-zoom { display: block; }

        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: flex-start; }
            .right-section { position: absolute; right: 15px; top: 15px; }
        }
    </style>
</head>

<body>
    <div class="overlay-bg" id="overlay"></div>

    <div class="rumus-floating r1">E = mc²</div>
    <div class="rumus-floating r2">∫ x dx = ½x² + C</div>
    <div class="rumus-floating r3">H₂SO₄ + 2NaOH</div>
    <div class="rumus-floating r4">a² + b² = c²</div>

    <div class="header">
        <div class="header-content">
            <h1>Memories of XI-4</h1>
            <div class="social-container">
                <a href="https://instagram.com/elvor4.ofc" target="_blank" class="btn-social ig">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png"> Instagram
                </a>
                <a href="https://www.tiktok.com/@sebelasss_empat" class="btn-social tt">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Tiktok_icon.svg"> TikTok
                </a>
            </div>
            <nav class="navbar">
                <a onclick="showPage('home')">Home</a>
                <a onclick="showPage('upload')">Upload</a>
                <a href="about.html">Struktur</a>
                <a id="login-nav-btn" onclick="showPage('login')">Login</a>
                <a id="logout-btn" onclick="logout()" style="display:none; color: #ff4444;">Logout</a>
            </nav>
        </div>
        <div class="right-section">
            <video autoplay muted loop playsinline id="header-video">
                <source src="logo.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div id="home-page" class="page active">
        <h2 style="border-bottom: 2px solid #ff0050; display: inline-block;">Galery Moment Elvor4</h2>
        <div class="content" id="gallery-container"></div>
    </div>

    <div id="login-page" class="page">
        <div style="max-width: 320px; margin: auto; background: #222; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #444;">
            <h2>Login XI-4</h2>
            <input type="text" id="user" placeholder="Username" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; background:#111; color:white; border:1px solid #333;">
            <input type="password" id="pass" placeholder="Password" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; background:#111; color:white; border:1px solid #333;">
            <p id="error-msg" style="color: #ff4444; font-size: 12px; display: none;"></p>
            <button onclick="login()" style="width:100%; padding:12px; background:#ff0050; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">MASUK</button>
        </div>
    </div>

    <div id="upload-page" class="page">
        <h2>Upload Momen</h2>
        <div style="max-width: 500px; background: #222; padding: 25px; border-radius: 15px; border: 1px solid #444;">
            
            <div id="dropArea">
                <h3>Drag & Drop Momen</h3>
                <p>Klik atau geser foto/video ke sini</p>
                <input type="file" id="media-file" accept="image/*,video/*" style="display: none;">
                <div id="preview"></div>
            </div>

            <textarea id="media-desc" rows="4" style="width:100%; background:#333; color:white; padding:10px; border-radius:8px; margin-bottom:15px;" placeholder="Tulis kenangan..."></textarea>
            
            <button id="btn-post" onclick="processUpload()" style="background:#00c851; color:white; padding:12px; border:none; border-radius:8px; width:100%; font-weight:bold; cursor:pointer;">POSTING SEKARANG</button>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAQqcXjVEa0K2oNJXcqTl9lCh8lT1ufBwY",
            authDomain: "elvor4.firebaseapp.com",
            databaseURL: "https://elvor4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "elvor4",
            storageBucket: "elvor4.firebasestorage.app",
            messagingSenderId: "722842875129",
            appId: "1:722842875129:web:3735e1f5f2ed03bfd59e28"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // NAVIGASI
        function showPage(id) {
            if (id === 'upload' && !localStorage.getItem("auth_elvor")) {
                alert("Login dulu bos!");
                id = 'login';
            }
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id + '-page').classList.add('active');
            checkBtnLogout();
        }

        function checkBtnLogout() {
            const isAuth = localStorage.getItem("auth_elvor");
            document.getElementById('logout-btn').style.display = isAuth ? "inline" : "none";
            document.getElementById('login-nav-btn').style.display = isAuth ? "none" : "inline";
        }

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u === 'xi4' && p === '123') {
                localStorage.setItem("auth_elvor", "active");
                showPage('home');
            } else {
                alert("Salah!");
            }
        }

        function logout() {
            localStorage.removeItem("auth_elvor");
            location.reload();
        }

        // DRAG & DROP LOGIC
        const dropArea = document.getElementById("dropArea");
        const fileInput = document.getElementById("media-file");

        dropArea.onclick = () => fileInput.click();

        dropArea.ondragover = (e) => { e.preventDefault(); dropArea.classList.add("drag"); };
        dropArea.ondragleave = () => dropArea.classList.remove("drag");
        dropArea.ondrop = (e) => {
            e.preventDefault();
            dropArea.classList.remove("drag");
            fileInput.files = e.dataTransfer.files;
            handlePreview(fileInput.files[0]);
        };

        fileInput.onchange = () => handlePreview(fileInput.files[0]);

        function handlePreview(file) {
            const preview = document.getElementById("preview");
            preview.innerHTML = "";
            if (file && file.type.startsWith("image/")) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement("img");
                    img.src = e.target.result;
                    preview.appendChild(img);
                }
                reader.readAsDataURL(file);
            } else if (file && file.type.startsWith("video/")) {
                preview.innerHTML = "<p>Video terpilih: " + file.name + "</p>";
            }
        }

        // UPLOAD KE FIREBASE
        function processUpload() {
            const file = fileInput.files[0];
            const desc = document.getElementById('media-desc').value;
            const btn = document.getElementById('btn-post');

            if (!file || !desc) return alert("Lengkapi data!");

            const reader = new FileReader();
            btn.innerText = "Sabar, lagi upload...";
            btn.disabled = true;

            reader.onload = function (e) {
                const newKey = database.ref().child('memories').push().key;
                database.ref('memories/' + newKey).set({
                    id: newKey,
                    data: e.target.result,
                    type: file.type.startsWith('video') ? 'video' : 'image',
                    desc: desc
                }).then(() => {
                    alert("Berhasil!");
                    location.reload();
                });
            };
            reader.readAsDataURL(file);
        }

        // LOAD DATA
        function loadOnlineData() {
            const container = document.getElementById('gallery-container');
            database.ref('memories').on('value', (snapshot) => {
                container.innerHTML = "";
                snapshot.forEach((child) => {
                    const item = child.val();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = (e) => toggleCard(card, e);

                    let media = item.type === 'image' 
                        ? `<img src="${item.data}" onload="this.parentElement.classList.add('loaded')">`
                        : `<video src="${item.data}" onloadeddata="this.parentElement.classList.add('loaded')" controls></video>`;

                    card.innerHTML = `<div class="close-zoom" onclick="closeZoom(this, event)">×</div>${media}<p>${item.desc}</p>`;
                    container.prepend(card);
                });
            });
        }

        function toggleCard(card, event) {
            if (event.target.classList.contains('close-zoom')) return;
            const overlay = document.getElementById('overlay');
            card.classList.add('active');
            overlay.style.display = 'block';
            document.body.appendChild(card);
        }

        function closeZoom(btn, event) {
            event.stopPropagation();
            const card = btn.parentElement;
            card.classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('gallery-container').prepend(card);
        }

        window.onload = () => { loadOnlineData(); checkBtnLogout(); };
    </script>
</body>
</html>
